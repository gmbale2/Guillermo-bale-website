<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Page not found — Guillermo Bale</title>
<meta name="robots" content="noindex,follow" />
<link rel="canonical" href="https://guillermobale.com/" />
<style>
:root{--ink:#0b0a09;--cream:#ece4d3;--mute:#8a8071;--accent:#7fb3c9;--serif:'Cormorant Garamond','Times New Roman',serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--ink);color:var(--cream);font-family:system-ui,-apple-system,sans-serif;display:grid;place-items:center;text-align:center;padding:24px}
h1{font-family:var(--serif);font-size:clamp(48px,8vw,96px);font-weight:300;letter-spacing:-0.02em;margin:0 0 16px}
h1 em{font-style:italic;color:var(--accent)}
p{color:var(--mute);max-width:480px;line-height:1.6;margin:0 0 32px}
a{color:var(--accent);text-decoration:none;font-family:var(--mono);font-size:12px;letter-spacing:0.18em;text-transform:uppercase;border:1px solid var(--accent);padding:14px 22px;transition:all .3s}
a:hover{background:var(--accent);color:var(--ink)}
.tag{font-family:var(--mono);font-size:11px;letter-spacing:0.28em;color:var(--mute);text-transform:uppercase;margin-bottom:22px}
</style>
</head>
<body>
<main>
  <div class="tag">Error 404</div>
  <h1>Lost in <em>the cut.</em></h1>
  <p>This page didn't make the final edit. Head back to the main story.</p>
  <a href="/">Return home →</a>
</main>
</body>
</html>
